name: Build and Release Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'mobile-app/package-lock.json'

      - name: Install dependencies
        working-directory: ./mobile-app
        run: npm ci

      - name: Create Env File
        working-directory: ./mobile-app
        run: |
          echo "EXPO_PUBLIC_API_URL=https://justus-9wqw.onrender.com/api" > .env
          echo "EXPO_PUBLIC_API_URL_DEV=http://192.168.100.82:5000/api" >> .env

      - name: Setup Expo and Prebuild Android
        working-directory: ./mobile-app
        run: npx expo prebuild --platform android --no-install

      - name: Configure Custom APK Output Name in Gradle
        run: |
          node -e "
          const fs = require('fs');
          const file = 'mobile-app/android/app/build.gradle';
          let content = fs.readFileSync(file, 'utf8');
          const target = /kotlinOptions\s*\{\s*jvmTarget\s*=\s*'17'\s*\}\s*\n\}/;
          if (target.test(content)) {
            content = content.replace(target, 'kotlinOptions {\n        jvmTarget = \'17\'\n    }\n\n    applicationVariants.all { variant ->\n        variant.outputs.all {\n            outputFileName = \"JustUs.apk\"\n        }\n    }\n}');
            fs.writeFileSync(file, content, 'utf8');
            console.log('✅ Gradle output filename configured successfully');
          } else {
            console.warn('⚠️ Could not find exact kotlinOptions block. Appending to end of android block.');
            const idx = content.lastIndexOf('}');
            if (idx !== -1) {
              content = content.slice(0, idx) + '\n    applicationVariants.all { variant ->\n        variant.outputs.all {\n            outputFileName = \"JustUs.apk\"\n        }\n    }\n' + content.slice(idx);
              fs.writeFileSync(file, content, 'utf8');
              console.log('✅ Appended variant rename configuration to the end of android block');
            } else {
              throw new Error('Could not find closing brace of android block in build.gradle');
            }
          }
          "

      - name: Build Release APK via Gradle
        working-directory: ./mobile-app/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Copy Built APK
        run: |
          cp mobile-app/android/app/build/outputs/apk/release/JustUs.apk JustUs.apk

      - name: Create or Update Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest Release"
          body: |
            Automated production build of the JustUs Android App.
            
            This release is automatically updated on every push to the `main` branch.
            Built on: ${{ github.event.head_commit.timestamp || 'Manual Trigger' }}
            Commit: ${{ github.sha }}
            Message: ${{ github.event.head_commit.message || 'Manual Build' }}
          artifacts: "JustUs.apk"
          allowUpdates: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
